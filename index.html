<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Webpage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <body class="bg-slate-100 min-h-screen flex items-center justify-center">
        <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-lg">
            <h1 class="text-3xl font-bold text-center text-blue-600">Personalized Webpage</h1>
            <p class="text-center text-gray-600 mt-2 mb-6">Enter Your Details Below</p>
            <form id="userForm" class="space-y-5">
                <div>
                    <label for="name" class="block text-gray-700 font-medium mb-2">Name</label>
                    <input type="text" id="name" placeholder="Enter Your Name" class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="age" class="block text-gray-700 font-medium mb-2">Age</label>
                    <input type="number" id="age" placeholder="Enter Your Age" class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full  bg-blue-600 text-white py-3 font-medium py-3 rounded hover:bg-blue-700 transition ">Save Information</button>
            </form>
            
            </div>
        </div>


    <script src="script.js"></script>

    </body>
</body>
</html>
